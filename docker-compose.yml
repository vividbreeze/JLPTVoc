services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jlptvoc
    restart: unless-stopped
    ports:
      - "3020:3020"
    volumes:
      - jlptvoc-data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3020
      DB_PATH: /app/data
      CORS_ORIGIN: "*"

volumes:
  jlptvoc-data:
    driver: local
